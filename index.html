<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanillaFlow</title>
</head>
<body>
    <div x-if="isVisible">
        <p>This should be visible</p>
    </div>
    <div x-show="isHidden">
        <p>This should be hidden</p>
    </div>
    <div x-text="message"></div>
    <div x-html="htmlContent"></div>

    <script type="module">
        import VanillaFlow from './VanillaFlow.js';
        
        const data = {
            isVisible: true,
            isHidden: true,
            message: 'Replaced text',
            htmlContent: '<strong>Bold HTML</strong>'
        };
        
        new VanillaFlow(data).init();
    </script>
</body>
</html>
